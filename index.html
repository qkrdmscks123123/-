<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>체육대회 일정표</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, update, remove, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  /* ──────────────────────────────────────────
     🔧 Firebase 설정 (자신의 프로젝트 값으로 교체)
     https://console.firebase.google.com 에서 프로젝트 생성 후
     '앱 추가 > 웹' 을 선택하면 아래 값들을 얻을 수 있습니다.
  ────────────────────────────────────────── */
  const firebaseConfig = {
    apiKey:            "AIzaSyAVSLJrQDD2fxlc2kkaVlGhVaxCpsltUz0",
    authDomain:        "semyung-spor.firebaseapp.com",
    databaseURL:       "https://semyung-spor-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId:         "semyung-spor",
    storageBucket:     "semyung-spor.firebasestorage.app",
    messagingSenderId: "266780919685",
    appId:             "1:266780919685:web:f40b3e20b3a8ab30e726ec"
    measurementId:     "G-W3EZWJ9V8X"
  };

  // Firebase 미설정 시 로컬 데모 모드로 동작
  let db = null;
  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    window._db = db;
    window._ref = ref;
    window._onValue = onValue;
    window._push = push;
    window._update = update;
    window._remove = remove;
    window._set = set;
    window._firebaseReady = true;
  } catch(e) {
    console.warn("Firebase 미설정: 로컬 데모 모드로 실행됩니다.", e);
    window._firebaseReady = false;
  }
  window.dispatchEvent(new Event("firebaseLoaded"));
</script>

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  background: #f5f4f0;
  color: #2c2c2a;
  min-height: 100vh;
}
a { text-decoration: none; }

/* ── Variables ── */
:root {
  --primary:       #1D9E75;
  --primary-dark:  #0F6E56;
  --primary-light: #E1F5EE;
  --amber:         #BA7517;
  --amber-light:   #FAEEDA;
  --amber-mid:     #FAC775;
  --red:           #E24B4A;
  --red-light:     #FCEBEB;
  --blue:          #378ADD;
  --blue-light:    #E6F1FB;
  --gray-bg:       #F1EFE8;
  --gray-mid:      #888780;
  --gray-dark:     #444441;
  --border:        rgba(136,135,128,0.18);
  --border-md:     rgba(136,135,128,0.30);
  --radius-sm:     8px;
  --radius-md:     12px;
  --radius-lg:     16px;
  --shadow:        0 1px 4px rgba(0,0,0,0.07);
}

/* ── Layout ── */
.page-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 1.25rem 1rem 3rem;
}

/* ── Header ── */
.site-header {
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.site-header h1 { font-size: 1.25rem; font-weight: 600; }
.site-header .subtitle { font-size: 0.8rem; opacity: 0.8; margin-top: 3px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 99px; padding: 4px 12px;
  font-size: 0.75rem; white-space: nowrap;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #FAC775;
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Admin bar ── */
.admin-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.75rem;
}
.admin-bar .clock { font-size: 0.75rem; color: var(--gray-mid); }
.btn-sm {
  font-size: 0.75rem; padding: 5px 13px;
  border: 1px solid var(--border-md);
  border-radius: 99px;
  background: #fff; color: var(--gray-dark);
  cursor: pointer; transition: background 0.12s;
}
.btn-sm:hover { background: var(--gray-bg); }

/* ── Notice section ── */
.section-title {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--gray-mid);
  margin-bottom: 0.5rem;
}
.notice-list {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.25rem;
  max-height: 260px; overflow-y: auto;
  padding-right: 2px;
}
.notice-list::-webkit-scrollbar { width: 4px; }
.notice-list::-webkit-scrollbar-track { background: transparent; }
.notice-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }
.notice-item {
  background: #fff; border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex; align-items: flex-start; gap: 10px;
  box-shadow: var(--shadow);
  flex-shrink: 0;
}
.notice-item.urgent { border-left: 3px solid var(--red); }
.notice-item.info   { border-left: 3px solid var(--blue); }
.notice-badge {
  font-size: 0.68rem; font-weight: 600;
  padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0;
}
.badge-urgent { background: var(--red-light);  color: var(--red); }
.badge-info   { background: var(--blue-light); color: var(--blue); }
.notice-text { font-size: 0.82rem; line-height: 1.55; flex: 1; }
.notice-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.notice-time { font-size: 0.7rem; color: var(--gray-mid); }
.del-btn { font-size: 0.7rem; color: var(--gray-mid); background: none; border: none; cursor: pointer; padding: 0; }
.del-btn:hover { color: var(--red); }
.no-notice { font-size: 0.82rem; color: var(--gray-mid); padding: 8px 0; }

/* ── Filters ── */
.filter-card {
  background: #fff; border: 0.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  box-shadow: var(--shadow);
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 0.72rem; color: var(--gray-mid); }
.filter-group select {
  font-size: 0.82rem; padding: 6px 10px;
  border: 0.5px solid var(--border-md);
  border-radius: var(--radius-sm);
  background: var(--gray-bg); color: var(--gray-dark);
  cursor: pointer;
}
.filter-group select:focus { outline: 2px solid var(--primary); }
.btn-reset {
  font-size: 0.8rem; padding: 7px 14px;
  border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
  background: transparent; color: var(--gray-mid); cursor: pointer;
  margin-top: auto;
}
.btn-reset:hover { background: var(--gray-bg); }

/* ── Class tabs ── */
.class-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.class-tab {
  padding: 5px 13px; font-size: 0.8rem;
  border-radius: 99px; border: 0.5px solid var(--border-md);
  background: transparent; color: var(--gray-dark); cursor: pointer;
  transition: all 0.12s;
}
.class-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.class-tab:hover:not(.active) { background: var(--gray-bg); }

/* ── Timeline ── */
.timeline { display: flex; flex-direction: column; width: 100%; }
.time-block { display: flex; gap: 0; align-items: stretch; width: 100%; }
.time-col {
  width: 68px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding-top: 15px;
}
.time-label { font-size: 0.75rem; font-weight: 600; color: var(--gray-mid); white-space: nowrap; }
.time-line { width: 1px; background: var(--border-md); flex: 1; min-height: 12px; margin-top: 5px; }
.event-col { flex: 1; min-width: 0; padding: 0 0 16px 10px; display: flex; flex-direction: column; gap: 8px; }

/* ── Event card ── */
.event-card {
  background: #fff; border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s;
  cursor: default;
}
.event-card:hover { border-color: var(--border-md); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.event-card.status-current {
  border-color: var(--primary);
  border-width: 1.5px;
  background: var(--primary-light);
}
.event-card.status-done { opacity: 0.52; }

.event-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.event-name { font-size: 0.95rem; font-weight: 600; }
.status-badge {
  font-size: 0.68rem; font-weight: 600; padding: 2px 9px;
  border-radius: 99px;
}
.badge-current  { background: var(--primary);     color: #fff; }
.badge-upcoming { background: var(--amber-light);  color: var(--amber); }
.badge-done     { background: var(--gray-bg);      color: var(--gray-mid); }

.event-meta { display: flex; gap: 14px; flex-wrap: wrap; }
.event-meta-item { font-size: 0.76rem; color: var(--gray-mid); }

.tag-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.class-tag {
  font-size: 0.68rem; padding: 2px 8px; border-radius: 99px;
  background: var(--blue-light); color: var(--blue);
}
.class-tag.highlight { background: var(--primary); color: #fff; }

.empty-state {
  text-align: center; padding: 3.5rem 1rem;
  font-size: 0.85rem; color: var(--gray-mid);
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.38);
  display: none; align-items: center; justify-content: center;
  z-index: 200; padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: #fff; border-radius: var(--radius-lg);
  padding: 1.5rem; width: 100%; max-width: 460px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  animation: popIn 0.18s ease;
}
@keyframes popIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
.modal-box h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1.1rem; }
.modal-menu-btn {
  display: block; width: 100%; text-align: left;
  padding: 10px 14px; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border-md);
  background: #fff; font-size: 0.85rem; cursor: pointer;
  margin-bottom: 8px; transition: background 0.1s;
}
.modal-menu-btn:hover { background: var(--gray-bg); }
.modal-menu-btn.green  { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); }
.modal-menu-btn.blue   { background: var(--blue-light);    color: var(--blue);        border-color: var(--blue); }
.modal-menu-btn.amber  { background: var(--amber-light);   color: var(--amber);       border-color: var(--amber); }
.modal-menu-btn.red    { background: var(--red-light);     color: var(--red);         border-color: var(--red); }

.form-row { margin-bottom: 11px; }
.form-row label { display: block; font-size: 0.72rem; color: var(--gray-mid); margin-bottom: 4px; }
.form-row input,
.form-row select,
.form-row textarea {
  width: 100%; font-size: 0.82rem; padding: 7px 10px;
  border: 0.5px solid var(--border-md); border-radius: var(--radius-sm);
  background: var(--gray-bg); color: var(--gray-dark);
  font-family: inherit;
}
.form-row input:focus,
.form-row select:focus,
.form-row textarea:focus { outline: 2px solid var(--primary); background: #fff; }
.form-row textarea { height: 76px; resize: vertical; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.1rem; }
.btn-primary {
  background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 8px 20px;
  font-size: 0.82rem; font-weight: 600; cursor: pointer;
  transition: background 0.12s;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-cancel {
  background: transparent; color: var(--gray-mid);
  border: 0.5px solid var(--border-md);
  border-radius: var(--radius-sm); padding: 8px 14px;
  font-size: 0.82rem; cursor: pointer;
}
.btn-cancel:hover { background: var(--gray-bg); }
.btn-danger {
  background: var(--red-light); color: var(--red);
  border: 0.5px solid var(--red); border-radius: var(--radius-sm);
  padding: 8px 14px; font-size: 0.82rem; cursor: pointer;
}

/* ── Auth ── */
.auth-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none; align-items: center; justify-content: center;
  z-index: 300; padding: 1rem;
}
.auth-overlay.open { display: flex; }
.auth-box {
  background: #fff; border-radius: var(--radius-lg);
  padding: 2rem 1.75rem; width: 100%; max-width: 360px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  animation: popIn 0.18s ease;
  text-align: center;
}
.auth-icon { font-size: 2rem; margin-bottom: 0.5rem; }
.auth-box h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.3rem; }
.auth-box p  { font-size: 0.78rem; color: var(--gray-mid); margin-bottom: 1.25rem; line-height: 1.5; }
.auth-input-wrap { position: relative; margin-bottom: 0.75rem; }
.auth-input-wrap input {
  width: 100%; padding: 10px 40px 10px 14px;
  font-size: 0.9rem; letter-spacing: 0.1em;
  border: 1px solid var(--border-md); border-radius: var(--radius-sm);
  background: var(--gray-bg); color: var(--gray-dark);
  text-align: center; font-family: inherit;
}
.auth-input-wrap input:focus { outline: 2px solid var(--primary); background: #fff; }
.auth-input-wrap input.error { border-color: var(--red); background: var(--red-light); }
.toggle-pw {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 0.85rem; color: var(--gray-mid); padding: 2px;
}
.auth-error { font-size: 0.75rem; color: var(--red); margin-bottom: 0.75rem; min-height: 1rem; }
.auth-locked { font-size: 0.75rem; color: var(--red); font-weight: 600; }
.btn-auth {
  width: 100%; background: var(--primary); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 10px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.12s; margin-bottom: 0.5rem;
}
.btn-auth:hover:not(:disabled) { background: var(--primary-dark); }
.btn-auth:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-auth-cancel { font-size: 0.78rem; color: var(--gray-mid); background: none; border: none; cursor: pointer; }
.btn-auth-cancel:hover { color: var(--gray-dark); }

.admin-logged-in .btn-sm { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); font-weight: 600; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--gray-dark); color: #fff;
  padding: 9px 20px; border-radius: 99px; font-size: 0.8rem;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; }

/* ── Responsive ── */
@media(max-width: 480px) {
  .site-header h1 { font-size: 1.05rem; }
  .time-col { width: 54px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page-wrap">

  <!-- Header -->
  <header class="site-header">
    <div>
      <h1 id="eventTitle">2025 체육대회 일정표</h1>
      <p class="subtitle" id="eventSubtitle">○○고등학교 · 운동장 및 체육관</p>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="liveLabel">실시간 업데이트 중</span>
    </div>
  </header>

  <!-- Admin bar -->
  <div class="admin-bar">
    <span class="clock" id="clockEl"></span>
    <button class="btn-sm" onclick="openAdmin()">⚙ 관리자 모드</button>
  </div>

  <!-- Notices -->
  <p class="section-title">📢 공지사항</p>
  <div class="notice-list" id="noticeList">
    <p class="no-notice">공지사항을 불러오는 중...</p>
  </div>

  <!-- Filters -->
  <div class="filter-card">
    <div class="filter-group">
      <label>학년</label>
      <select id="gradeFilter" onchange="onGradeChange()">
        <option value="">전체</option>
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
      </select>
    </div>
    <div class="filter-group">
      <label>반</label>
      <select id="classFilter" onchange="renderTimeline()">
        <option value="">전체</option>
      </select>
    </div>
    <div class="filter-group">
      <label>종목</label>
      <select id="sportFilter" onchange="renderTimeline()">
        <option value="">전체</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">초기화</button>
  </div>

  <!-- Class Tabs (shown when grade is selected) -->
  <div class="class-tabs" id="classTabs" style="display:none"></div>

  <!-- Timeline -->
  <div class="timeline" id="timeline">
    <div class="empty-state">일정을 불러오는 중...</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Auth Modal -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <div class="auth-icon">🔐</div>
    <h2>관리자 인증</h2>
    <p>관리자만 접근할 수 있습니다.<br>담당 선생님께 비밀번호를 문의하세요.</p>
    <div class="auth-input-wrap">
      <input type="password" id="pwInput" placeholder="비밀번호 입력"
        onkeydown="if(event.key==='Enter')doLogin()"
        oninput="clearAuthError()"/>
      <button class="toggle-pw" onclick="togglePwVis()" title="보기/숨기기">👁</button>
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn-auth" id="loginBtn" onclick="doLogin()">확인</button>
    <br>
    <button class="btn-auth-cancel" onclick="closeAuthModal()">취소</button>
  </div>
</div>

<!-- Admin Modal -->
<div class="modal-overlay" id="adminModal" onclick="if(event.target===this)closeAdmin()">
  <div class="modal-box">
    <h2 id="modalTitle">관리자 메뉴</h2>

    <!-- Main Menu -->
    <div id="pMenu">
      <button class="modal-menu-btn green" onclick="showPage('pNotice')">📢 공지사항 추가</button>
      <button class="modal-menu-btn blue"  onclick="showPage('pEvent')">📅 경기 일정 추가</button>
      <button class="modal-menu-btn amber" onclick="showPage('pStatus')">🔄 경기 상태 변경</button>
      <button class="modal-menu-btn red"   onclick="showPage('pDelete')">🗑 경기 삭제</button>
      <button class="modal-menu-btn"       onclick="showPage('pPwMgr')" style="color:var(--gray-mid)">🔑 비밀번호 관리</button>
      <div class="modal-actions">
        <button class="btn-danger" onclick="doLogout()">로그아웃</button>
        <button class="btn-cancel" onclick="closeAdmin()">닫기</button>
      </div>
    </div>

    <!-- Add Notice -->
    <div id="pNotice" style="display:none">
      <div class="form-row">
        <label>중요도</label>
        <select id="nType">
          <option value="urgent">긴급 (빨간색)</option>
          <option value="info">일반 (파란색)</option>
        </select>
      </div>
      <div class="form-row">
        <label>공지 내용</label>
        <textarea id="nText" placeholder="공지 내용을 입력하세요..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-primary" onclick="addNotice()">등록</button>
      </div>
    </div>

    <!-- Add Event -->
    <div id="pEvent" style="display:none">
      <div class="form-grid">
        <div class="form-row">
          <label>시작 시간 (HH:MM)</label>
          <input id="eTime" type="time" value="09:00"/>
        </div>
        <div class="form-row">
          <label>소요 시간 (분)</label>
          <input id="eDur" type="number" value="40" min="10" max="120"/>
        </div>
        <div class="form-row">
          <label>종목</label>
          <input id="eSport" placeholder="예: 축구"/>
        </div>
        <div class="form-row">
          <label>장소</label>
          <input id="ePlace" placeholder="예: 운동장 A구역"/>
        </div>
      </div>
      <div class="form-row">
        <label>참가 반 (쉼표 구분, 예: 1-1, 2-3, 3-2)</label>
        <input id="eClasses" placeholder="1-1, 1-2, 2-3"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-primary" onclick="addEvent()">추가</button>
      </div>
    </div>

    <!-- Change Status -->
    <div id="pStatus" style="display:none">
      <div class="form-row">
        <label>경기 선택</label>
        <select id="sEventId"></select>
      </div>
      <div class="form-row">
        <label>변경할 상태</label>
        <select id="sStatus">
          <option value="upcoming">예정</option>
          <option value="current">진행중</option>
          <option value="done">완료</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-primary" onclick="changeStatus()">변경</button>
      </div>
    </div>

    <!-- Delete Event -->
    <div id="pDelete" style="display:none">
      <div class="form-row">
        <label>삭제할 경기</label>
        <select id="dEventId"></select>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-danger" onclick="deleteEvent()">삭제</button>
      </div>
    </div>

    <!-- Password Manager -->
    <div id="pPwMgr" style="display:none">
      <p style="font-size:0.78rem;color:var(--gray-mid);margin-bottom:0.75rem;">
        등록된 비밀번호 중 하나라도 맞으면 로그인됩니다.<br>
        여러 명이 각자 다른 비밀번호를 쓸 수 있습니다.
      </p>
      <div id="pwList" style="margin-bottom:0.75rem;display:flex;flex-direction:column;gap:6px;"></div>
      <div style="display:flex;gap:6px;">
        <input id="newPwInput" type="password" placeholder="새 비밀번호 (4자 이상)"
          style="flex:1;font-size:0.82rem;padding:7px 10px;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);background:var(--gray-bg);color:var(--gray-dark);font-family:inherit;"
          onkeydown="if(event.key==='Enter')addPassword()"/>
        <button class="btn-primary" onclick="addPassword()" style="white-space:nowrap;">추가</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="showPage('pMenu')">뒤로</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════════════════════
   AUTH CONFIG
   ✏️  비밀번호를 여기서 수정하세요.
   여러 개 등록 가능 — 하나라도 맞으면 로그인됩니다.
════════════════════════════════════════════ */
const ADMIN_PASSWORDS_KEY = "sportsday_admin_pws";

function getPasswords() {
  try {
    const raw = sessionStorage.getItem(ADMIN_PASSWORDS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  // 기본 비밀번호 목록 — 처음 설치 시 원하는 값으로 바꾸세요
  return ["admin1234", "teacher2025", "sports2025"];
}
function savePasswords(list) {
  sessionStorage.setItem(ADMIN_PASSWORDS_KEY, JSON.stringify(list));
}

/* ── Auth State ── */
let isAdmin = false;
let failCount = 0;
const MAX_FAIL = 5;
let lockUntil  = 0;   // timestamp ms

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let notices  = [];
let events   = [];
let activeTab = "";   // currently highlighted class tab

const ALL_CLASSES = [
  "1-1","1-2","1-3","1-4",
  "2-1","2-2","2-3","2-4",
  "3-1","3-2","3-3","3-4"
];

const DEMO_NOTICES = [
  { id:"n1", type:"urgent", text:"13:00 이어달리기 출발 위치가 B트랙으로 변경되었습니다. 관련 반은 12:50까지 집합해 주세요.", time:"11:42" },
  { id:"n2", type:"info",   text:"점심시간은 12:00~13:00입니다. 급식실 혼잡을 방지하기 위해 학년별로 나누어 입장합니다.", time:"09:15" },
  { id:"n3", type:"info",   text:"오늘 날씨가 매우 덥습니다. 수분 섭취에 신경 써 주세요. 매점에서 음료 판매 중입니다.", time:"08:50" }
];

const DEMO_EVENTS = [
  { id:"e1",  time:"09:00", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["1-1","1-2","1-3","1-4"], status:"done" },
  { id:"e2",  time:"09:00", sport:"축구",       place:"운동장 B",     dur:40, classes:["2-1","2-2"],             status:"done" },
  { id:"e3",  time:"09:40", sport:"배구",       place:"체육관 1코트", dur:40, classes:["3-1","3-2"],             status:"done" },
  { id:"e4",  time:"10:00", sport:"줄다리기",   place:"운동장 중앙",  dur:30, classes:["1-1","1-2","2-1","2-2"], status:"done" },
  { id:"e5",  time:"10:30", sport:"농구",       place:"체육관 2코트", dur:40, classes:["2-3","2-4"],             status:"current" },
  { id:"e6",  time:"10:30", sport:"피구",       place:"운동장 A구역", dur:40, classes:["1-3","1-4"],             status:"current" },
  { id:"e7",  time:"11:20", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["2-1","2-2","2-3","2-4"], status:"upcoming" },
  { id:"e8",  time:"11:20", sport:"축구",       place:"운동장 B",     dur:40, classes:["3-3","3-4"],             status:"upcoming" },
  { id:"e9",  time:"13:00", sport:"이어달리기", place:"운동장 B트랙", dur:30, classes:["3-1","3-2","3-3","3-4"], status:"upcoming" },
  { id:"e10", time:"13:00", sport:"줄다리기",   place:"운동장 중앙",  dur:30, classes:["3-1","3-2","1-3","1-4"], status:"upcoming" },
  { id:"e11", time:"14:00", sport:"배구",       place:"체육관 1코트", dur:40, classes:["1-1","1-2"],             status:"upcoming" },
  { id:"e12", time:"14:00", sport:"농구",       place:"체육관 2코트", dur:40, classes:["3-3","3-4"],             status:"upcoming" },
  { id:"e13", time:"15:00", sport:"피구",       place:"운동장 A구역", dur:40, classes:["2-3","2-4"],             status:"upcoming" },
  { id:"e14", time:"15:30", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["1-1","1-2","1-3","1-4"], status:"upcoming" },
  { id:"e15", time:"16:00", sport:"축구",       place:"운동장 B",     dur:40, classes:["1-1","1-2","2-1","2-2"], status:"upcoming" },
];

/* ════════════════════════════════════════════
   FIREBASE / DEMO INIT
════════════════════════════════════════════ */
function initApp() {
  if (window._firebaseReady) {
    initFirebase();
    document.getElementById("liveLabel").textContent = "Firebase 실시간 동기화 중";
  } else {
    notices = [...DEMO_NOTICES];
    events  = [...DEMO_EVENTS];
    renderNotices();
    renderSportFilter();
    renderTimeline();
    showToast("데모 모드: Firebase 미설정 상태입니다.");
  }
}

function initFirebase() {
  const db = window._db, rf = window._ref, ov = window._onValue;

  // Notices realtime listener
  ov(rf(db, "notices"), snap => {
    notices = [];
    snap.forEach(c => notices.push({ id: c.key, ...c.val() }));
    notices.sort((a,b) => b.time.localeCompare(a.time));
    if (!notices.length) {
      // seed demo data on first run
      DEMO_NOTICES.forEach(n => { const { id, ...data } = n; window._push(rf(db,"notices"), data); });
    }
    renderNotices();
  });

  // Events realtime listener
  ov(rf(db, "events"), snap => {
    events = [];
    snap.forEach(c => events.push({ id: c.key, ...c.val() }));
    events.sort((a,b) => a.time.localeCompare(b.time));
    if (!events.length) {
      DEMO_EVENTS.forEach(e => { const { id, ...data } = e; window._push(rf(db,"events"), data); });
    }
    renderSportFilter();
    renderTimeline();
  });
}

window.addEventListener("firebaseLoaded", initApp);
// Fallback if event already fired
if (document.readyState !== "loading") setTimeout(()=>{ if(!notices.length && !events.length) initApp(); }, 800);

/* ════════════════════════════════════════════
   RENDER NOTICES
════════════════════════════════════════════ */
function renderNotices() {
  const el = document.getElementById("noticeList");
  if (!notices.length) { el.innerHTML = '<p class="no-notice">공지사항이 없습니다.</p>'; return; }
  el.innerHTML = notices.map(n => `
    <div class="notice-item ${n.type}">
      <span class="notice-badge badge-${n.type}">${n.type === "urgent" ? "긴급" : "공지"}</span>
      <span class="notice-text">${escHtml(n.text)}</span>
      <span class="notice-meta">
        <span class="notice-time">${n.time}</span>
        <button class="del-btn" onclick="deleteNotice('${n.id}')">✕</button>
      </span>
    </div>
  `).join("");
}

/* ════════════════════════════════════════════
   RENDER SPORT FILTER OPTIONS
════════════════════════════════════════════ */
function renderSportFilter() {
  const sports = [...new Set(events.map(e => e.sport))].sort();
  const sel = document.getElementById("sportFilter");
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체</option>' +
    sports.map(s => `<option value="${s}" ${s===cur?"selected":""}>${s}</option>`).join("");
}

/* ════════════════════════════════════════════
   RENDER TIMELINE
════════════════════════════════════════════ */
function getFiltered() {
  const grade  = document.getElementById("gradeFilter").value;
  const cls    = activeTab || document.getElementById("classFilter").value;
  const sport  = document.getElementById("sportFilter").value;

  return events.filter(e => {
    if (sport && e.sport !== sport) return false;
    if (cls)   return e.classes.includes(cls);
    if (grade) return e.classes.some(c => c.startsWith(grade + "-"));
    return true;
  });
}

function renderTimeline() {
  const myClass = activeTab || document.getElementById("classFilter").value;
  const filtered = getFiltered();
  const tl = document.getElementById("timeline");

  if (!filtered.length) { tl.innerHTML = '<div class="empty-state">해당하는 경기 일정이 없습니다.</div>'; return; }

  const grouped = {};
  filtered.forEach(e => { (grouped[e.time] = grouped[e.time] || []).push(e); });
  const times = Object.keys(grouped).sort();

  let html = "";
  for (const t of times) {
    let cards = "";
    for (const e of grouped[t]) {
      const statusLabel = { current:"진행중", upcoming:"예정", done:"완료" }[e.status] || "예정";
      const tags = e.classes.map(c =>
        `<span class="class-tag ${myClass && c === myClass ? "highlight" : ""}">${escHtml(c)}</span>`
      ).join("");
      cards += `<div class="event-card status-${e.status}">` +
        `<div class="event-top">` +
        `<span class="event-name">${escHtml(e.sport)}</span>` +
        `<span class="status-badge badge-${e.status}">${statusLabel}</span>` +
        `</div>` +
        `<div class="event-meta">` +
        `<span class="event-meta-item">📍 ${escHtml(e.place)}</span>` +
        `<span class="event-meta-item">⏱ ${e.dur}분</span>` +
        `</div>` +
        `<div class="tag-list">${tags}</div>` +
        `</div>`;
    }
    html += `<div class="time-block">` +
      `<div class="time-col"><span class="time-label">${t}</span><div class="time-line"></div></div>` +
      `<div class="event-col">${cards}</div>` +
      `</div>`;
  }
  tl.innerHTML = html;
}

/* ════════════════════════════════════════════
   FILTER LOGIC
════════════════════════════════════════════ */
function onGradeChange() {
  const grade = document.getElementById("gradeFilter").value;
  activeTab = "";

  // Update class dropdown
  const cls = document.getElementById("classFilter");
  const filtered = grade ? ALL_CLASSES.filter(c => c.startsWith(grade + "-")) : ALL_CLASSES;
  cls.innerHTML = '<option value="">전체</option>' +
    filtered.map(c => `<option value="${c}">${c}반</option>`).join("");

  // Show/hide tabs
  const tabsEl = document.getElementById("classTabs");
  if (grade) {
    tabsEl.style.display = "flex";
    tabsEl.innerHTML =
      `<button class="class-tab active" onclick="setTab('')">전체</button>` +
      filtered.map(c => `<button class="class-tab" id="tab-${c}" onclick="setTab('${c}')">${c}반</button>`).join("");
  } else {
    tabsEl.style.display = "none";
    tabsEl.innerHTML = "";
  }
  renderTimeline();
}

function setTab(cls) {
  activeTab = cls;
  document.querySelectorAll(".class-tab").forEach(el => el.classList.remove("active"));
  const target = cls ? document.getElementById("tab-" + cls) : document.querySelector(".class-tab");
  if (target) target.classList.add("active");

  // Sync dropdown
  const sel = document.getElementById("classFilter");
  if (sel) sel.value = cls;
  renderTimeline();
}

function resetFilters() {
  document.getElementById("gradeFilter").value = "";
  document.getElementById("classFilter").value = "";
  document.getElementById("sportFilter").value = "";
  activeTab = "";
  document.getElementById("classTabs").style.display = "none";
  document.getElementById("classTabs").innerHTML = "";
  renderTimeline();
}

/* ════════════════════════════════════════════
   AUTH FUNCTIONS
════════════════════════════════════════════ */
function openAdmin() {
  if (isAdmin) {
    showPage("pMenu");
    populateEventSelects();
    document.getElementById("adminModal").classList.add("open");
  } else {
    openAuthModal();
  }
}

function openAuthModal() {
  document.getElementById("pwInput").value = "";
  document.getElementById("authError").textContent = "";
  document.getElementById("pwInput").classList.remove("error");
  document.getElementById("authOverlay").classList.add("open");
  checkLock();
  setTimeout(() => document.getElementById("pwInput").focus(), 80);
}

function closeAuthModal() {
  document.getElementById("authOverlay").classList.remove("open");
}

function togglePwVis() {
  const inp = document.getElementById("pwInput");
  inp.type = inp.type === "password" ? "text" : "password";
}

function clearAuthError() {
  document.getElementById("authError").textContent = "";
  document.getElementById("pwInput").classList.remove("error");
}

function checkLock() {
  const now = Date.now();
  const btn  = document.getElementById("loginBtn");
  const errEl = document.getElementById("authError");
  if (lockUntil > now) {
    const sec = Math.ceil((lockUntil - now) / 1000);
    errEl.innerHTML = `<span class="auth-locked">⛔ ${sec}초 후에 다시 시도하세요.</span>`;
    btn.disabled = true;
    setTimeout(checkLock, 1000);
  } else {
    btn.disabled = false;
    if (failCount >= MAX_FAIL) errEl.textContent = "";
  }
}

function doLogin() {
  if (Date.now() < lockUntil) return;
  const pw = document.getElementById("pwInput").value;
  const passwords = getPasswords();

  if (passwords.includes(pw)) {
    isAdmin = true;
    failCount = 0;
    closeAuthModal();
    document.querySelector(".admin-bar").classList.add("admin-logged-in");
    document.querySelector(".btn-sm").textContent = "⚙ 관리자 모드 (로그인됨)";
    showPage("pMenu");
    populateEventSelects();
    document.getElementById("adminModal").classList.add("open");
    showToast("관리자로 로그인되었습니다.");
  } else {
    failCount++;
    document.getElementById("pwInput").classList.add("error");
    document.getElementById("pwInput").value = "";

    if (failCount >= MAX_FAIL) {
      lockUntil = Date.now() + 30000;  // 30초 잠금
      document.getElementById("authError").innerHTML =
        `<span class="auth-locked">⛔ ${MAX_FAIL}회 실패 — 30초 잠금</span>`;
      document.getElementById("loginBtn").disabled = true;
      setTimeout(checkLock, 1000);
    } else {
      const left = MAX_FAIL - failCount;
      document.getElementById("authError").textContent =
        `비밀번호가 올바르지 않습니다. (${left}회 남음)`;
      setTimeout(() => document.getElementById("pwInput").focus(), 50);
    }
  }
}

function doLogout() {
  isAdmin = false;
  closeAdmin();
  document.querySelector(".admin-bar").classList.remove("admin-logged-in");
  document.querySelector(".btn-sm").textContent = "⚙ 관리자 모드";
  showToast("로그아웃 되었습니다.");
}

/* ── Password Manager ── */
function renderPwList() {
  const list = getPasswords();
  const el = document.getElementById("pwList");
  if (!list.length) { el.innerHTML = '<p style="font-size:0.78rem;color:var(--gray-mid);">등록된 비밀번호가 없습니다.</p>'; return; }
  el.innerHTML = list.map((pw, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--gray-bg);border-radius:var(--radius-sm);">
      <span style="flex:1;font-size:0.82rem;font-family:monospace;letter-spacing:0.08em;">${"●".repeat(pw.length)}</span>
      <span style="font-size:0.72rem;color:var(--gray-mid);">${pw.length}자</span>
      <button onclick="removePassword(${i})" style="font-size:0.72rem;color:var(--red);background:none;border:none;cursor:pointer;padding:2px 4px;">삭제</button>
    </div>
  `).join("");
}

function addPassword() {
  const inp = document.getElementById("newPwInput");
  const val = inp.value.trim();
  if (val.length < 4) { showToast("비밀번호는 4자 이상이어야 합니다."); return; }
  const list = getPasswords();
  if (list.includes(val)) { showToast("이미 등록된 비밀번호입니다."); return; }
  list.push(val);
  savePasswords(list);
  inp.value = "";
  renderPwList();
  showToast("비밀번호가 추가되었습니다.");
}

function removePassword(idx) {
  const list = getPasswords();
  if (list.length <= 1) { showToast("최소 1개의 비밀번호는 유지해야 합니다."); return; }
  list.splice(idx, 1);
  savePasswords(list);
  renderPwList();
  showToast("비밀번호가 삭제되었습니다.");
}

/* ════════════════════════════════════════════
   ADMIN MODAL
════════════════════════════════════════════ */
function closeAdmin() { document.getElementById("adminModal").classList.remove("open"); }

function showPage(id) {
  ["pMenu","pNotice","pEvent","pStatus","pDelete","pPwMgr"].forEach(p => {
    document.getElementById(p).style.display = p === id ? "" : "none";
  });
  const titles = {
    pMenu:"관리자 메뉴", pNotice:"공지사항 추가",
    pEvent:"경기 일정 추가", pStatus:"경기 상태 변경",
    pDelete:"경기 삭제", pPwMgr:"비밀번호 관리"
  };
  document.getElementById("modalTitle").textContent = titles[id] || "";
  if (id === "pPwMgr") renderPwList();
}

function populateEventSelects() {
  const opt = events.map(e =>
    `<option value="${e.id}">${e.time} ${e.sport} (${e.classes.join(", ")})</option>`
  ).join("");
  document.getElementById("sEventId").innerHTML = opt;
  document.getElementById("dEventId").innerHTML = opt;
}

/* ── Add Notice ── */
function addNotice() {
  const type = document.getElementById("nType").value;
  const text = document.getElementById("nText").value.trim();
  if (!text) { showToast("내용을 입력해 주세요."); return; }
  const now  = new Date();
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const data = { type, text, time };

  if (window._firebaseReady) {
    window._push(window._ref(window._db, "notices"), data);
  } else {
    notices.unshift({ id: "local_" + Date.now(), ...data });
    renderNotices();
  }
  document.getElementById("nText").value = "";
  closeAdmin();
  showToast("공지사항이 등록되었습니다.");
}

function deleteNotice(id) {
  if (!confirm("이 공지사항을 삭제하시겠습니까?")) return;
  if (window._firebaseReady) {
    window._remove(window._ref(window._db, `notices/${id}`));
  } else {
    notices = notices.filter(n => n.id !== id);
    renderNotices();
  }
  showToast("공지사항이 삭제되었습니다.");
}

/* ── Add Event ── */
function addEvent() {
  const time    = document.getElementById("eTime").value;
  const sport   = document.getElementById("eSport").value.trim();
  const place   = document.getElementById("ePlace").value.trim();
  const dur     = parseInt(document.getElementById("eDur").value) || 40;
  const rawCls  = document.getElementById("eClasses").value;
  const classes = rawCls.split(",").map(c => c.trim()).filter(Boolean);

  if (!time || !sport || !classes.length) { showToast("시간, 종목, 참가 반을 모두 입력해 주세요."); return; }

  const data = { time, sport, place, dur, classes, status:"upcoming" };
  if (window._firebaseReady) {
    window._push(window._ref(window._db, "events"), data);
  } else {
    events.push({ id:"local_"+Date.now(), ...data });
    events.sort((a,b)=>a.time.localeCompare(b.time));
    renderSportFilter();
    renderTimeline();
  }
  ["eTime","eSport","ePlace","eDur","eClasses"].forEach(id => {
    const el = document.getElementById(id);
    el.value = el.type === "number" ? 40 : el.type === "time" ? "09:00" : "";
  });
  closeAdmin();
  showToast("경기 일정이 추가되었습니다.");
}

/* ── Change Status ── */
function changeStatus() {
  const id     = document.getElementById("sEventId").value;
  const status = document.getElementById("sStatus").value;
  if (!id) { showToast("경기를 선택해 주세요."); return; }

  if (window._firebaseReady) {
    window._update(window._ref(window._db, `events/${id}`), { status });
  } else {
    const ev = events.find(e => e.id === id);
    if (ev) { ev.status = status; renderTimeline(); }
  }
  closeAdmin();
  showToast("경기 상태가 변경되었습니다.");
}

/* ── Delete Event ── */
function deleteEvent() {
  const id = document.getElementById("dEventId").value;
  if (!id) { showToast("삭제할 경기를 선택해 주세요."); return; }
  if (!confirm("이 경기를 삭제하시겠습니까?")) return;

  if (window._firebaseReady) {
    window._remove(window._ref(window._db, `events/${id}`));
  } else {
    events = events.filter(e => e.id !== id);
    renderSportFilter();
    renderTimeline();
  }
  closeAdmin();
  showToast("경기가 삭제되었습니다.");
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function pad(n) { return String(n).padStart(2,"0"); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2400);
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById("clockEl").textContent =
    `현재 시각: ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
updateClock();
setInterval(updateClock, 30000);
</script>
