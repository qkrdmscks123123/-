<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>체육대회 일정표</title>
<style>
/* ── 리셋 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f0efe9; color: #1e1e1c; line-height: 1.5; }

/* ── 변수 ── */
:root {
  --green:  #1D9E75; --green-d: #0F6E56; --green-l: #E1F5EE;
  --amber:  #BA7517; --amber-l: #FAEEDA;
  --red:    #E24B4A; --red-l:   #FCEBEB;
  --blue:   #378ADD; --blue-l:  #E6F1FB;
  --gray:   #F1EFE8; --gray-m:  #888780; --gray-d: #444441;
  --bd:     rgba(100,100,90,.15);
  --bd2:    rgba(100,100,90,.28);
  --r8: 8px; --r12: 12px; --r16: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

/* ── 레이아웃 ── */
.page { max-width: 860px; margin: 0 auto; padding: 1.25rem 1rem 4rem; }

/* ── 헤더 ── */
.site-header {
  background: var(--green);
  color: #fff;
  border-radius: var(--r16);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.25rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 10px;
}
.site-header h1 { font-size: 1.2rem; font-weight: 700; }
.site-header .sub { font-size: .78rem; opacity: .8; margin-top: 2px; }
.live-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.35);
  border-radius: 99px; padding: 4px 12px;
  font-size: .73rem; white-space: nowrap;
}
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #fac775; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .2; } }

/* ── 관리자 바 ── */
.admin-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: .9rem;
}
.clock { font-size: .73rem; color: var(--gray-m); }
.btn-admin {
  font-size: .73rem; padding: 5px 14px;
  border: 1px solid var(--bd2); border-radius: 99px;
  background: #fff; color: var(--gray-d); cursor: pointer;
  transition: background .12s;
}
.btn-admin:hover { background: var(--gray); }
.is-admin .btn-admin { background: var(--green-l); color: var(--green-d); border-color: var(--green); font-weight: 600; }

/* ── 공지 ── */
.sec-label { font-size: .68rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--gray-m); margin-bottom: .5rem; }
.notice-list {
  display: block;          /* ← flex 대신 block — 자식이 자연스럽게 쌓임 */
  margin-bottom: 1.25rem;
  max-height: 280px;
  overflow-y: auto;
  border-radius: var(--r8);
}
.notice-list::-webkit-scrollbar { width: 4px; }
.notice-list::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }
.n-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: #fff;
  border: .5px solid var(--bd);
  border-radius: var(--r8);
  padding: 10px 13px;
  margin-bottom: 6px;       /* ← gap 대신 margin — 높이가 확실히 잡힘 */
  box-shadow: var(--shadow);
}
.n-item:last-child { margin-bottom: 0; }
.n-item.urgent { border-left: 3px solid var(--red); }
.n-item.info   { border-left: 3px solid var(--blue); }
.n-badge { font-size: .65rem; font-weight: 700; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.nb-urgent { background: var(--red-l);  color: var(--red); }
.nb-info   { background: var(--blue-l); color: var(--blue); }
.n-text { font-size: .82rem; line-height: 1.55; flex: 1; }
.n-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.n-time { font-size: .68rem; color: var(--gray-m); white-space: nowrap; }
.n-del { font-size: .68rem; color: var(--gray-m); background: none; border: none; cursor: pointer; padding: 0; line-height: 1; }
.n-del:hover { color: var(--red); }
.no-notice { font-size: .82rem; color: var(--gray-m); padding: 6px 0; }

/* ── 필터 ── */
.filter-box {
  background: #fff; border: .5px solid var(--bd);
  border-radius: var(--r12); padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  box-shadow: var(--shadow);
}
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: .7rem; color: var(--gray-m); }
.fg select {
  font-size: .82rem; padding: 6px 10px;
  border: .5px solid var(--bd2); border-radius: var(--r8);
  background: var(--gray); color: var(--gray-d); cursor: pointer;
}
.btn-reset {
  font-size: .78rem; padding: 7px 14px;
  border: .5px solid var(--bd2); border-radius: var(--r8);
  background: transparent; color: var(--gray-m); cursor: pointer; margin-top: auto;
}
.btn-reset:hover { background: var(--gray); }

/* ── 반 탭 ── */
.class-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.c-tab {
  padding: 5px 13px; font-size: .78rem;
  border-radius: 99px; border: .5px solid var(--bd2);
  background: transparent; color: var(--gray-d); cursor: pointer;
}
.c-tab.on { background: var(--green); color: #fff; border-color: var(--green); }
.c-tab:hover:not(.on) { background: var(--gray); }

/* ── 타임라인 ── */
.timeline { display: block; }          /* block으로 단순하게 */
.time-row { display: flex; }
.time-col { width: 64px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 14px; }
.time-txt { font-size: .72rem; font-weight: 700; color: var(--gray-m); white-space: nowrap; }
.time-line { width: 1px; background: var(--bd2); flex: 1; min-height: 10px; margin-top: 4px; }
.event-col { flex: 1; min-width: 0; padding: 0 0 14px 10px; }  /* flex-col 제거 */
.e-card {
  display: block;          /* ← block으로 확실히 */
  background: #fff;
  border: .5px solid var(--bd);
  border-radius: var(--r12);
  padding: 12px 14px;
  margin-bottom: 8px;      /* gap 대신 margin */
  box-shadow: var(--shadow);
}
.e-card:last-child { margin-bottom: 0; }
.e-card.e-cur { border-color: var(--green); border-width: 1.5px; background: var(--green-l); }
.e-card.e-don { opacity: .5; }
.e-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
.e-name { font-size: .95rem; font-weight: 700; }
.e-badge { font-size: .65rem; font-weight: 700; padding: 2px 9px; border-radius: 99px; }
.eb-cur { background: var(--green); color: #fff; }
.eb-up  { background: var(--amber-l); color: var(--amber); }
.eb-don { background: var(--gray); color: var(--gray-m); }
.e-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 7px; }
.e-mi { font-size: .75rem; color: var(--gray-m); }
.e-tags { display: flex; gap: 5px; flex-wrap: wrap; }
.e-tag { font-size: .65rem; padding: 2px 8px; border-radius: 99px; background: var(--blue-l); color: var(--blue); }
.e-tag.hl { background: var(--green); color: #fff; }
.tl-empty { text-align: center; padding: 3rem 1rem; font-size: .85rem; color: var(--gray-m); }

/* ── 모달 공통 ── */
.modal-wrap {
  position: fixed; inset: 0; background: rgba(0,0,0,.42);
  display: none; align-items: center; justify-content: center;
  z-index: 300; padding: 1rem;
}
.modal-wrap.open { display: flex; }
.modal-box {
  background: #fff; border-radius: var(--r16);
  padding: 1.5rem; width: 100%; max-width: 460px;
  box-shadow: 0 12px 40px rgba(0,0,0,.18);
  animation: popIn .17s ease;
  max-height: 90vh; overflow-y: auto;
}
@keyframes popIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
.modal-box h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1.1rem; }
.m-btn {
  display: block; width: 100%; text-align: left;
  padding: 10px 14px; border-radius: var(--r8);
  border: .5px solid var(--bd2); background: #fff;
  font-size: .85rem; cursor: pointer; margin-bottom: 8px; font-family: inherit;
}
.m-btn:hover { background: var(--gray); }
.m-green { background: var(--green-l); color: var(--green-d); border-color: var(--green); }
.m-blue  { background: var(--blue-l);  color: var(--blue);    border-color: var(--blue); }
.m-amber { background: var(--amber-l); color: var(--amber);   border-color: var(--amber); }
.m-red   { background: var(--red-l);   color: var(--red);     border-color: var(--red); }
.form-row { margin-bottom: 11px; }
.form-row label { display: block; font-size: .7rem; color: var(--gray-m); margin-bottom: 4px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; font-size: .82rem; padding: 7px 10px;
  border: .5px solid var(--bd2); border-radius: var(--r8);
  background: var(--gray); color: var(--gray-d); font-family: inherit;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { outline: 2px solid var(--green); background: #fff; }
.form-row textarea { height: 80px; resize: vertical; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.1rem; }
.btn-p { background: var(--green); color: #fff; border: none; border-radius: var(--r8); padding: 8px 20px; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-p:hover { background: var(--green-d); }
.btn-c { background: transparent; color: var(--gray-m); border: .5px solid var(--bd2); border-radius: var(--r8); padding: 8px 14px; font-size: .82rem; cursor: pointer; font-family: inherit; }
.btn-d { background: var(--red-l); color: var(--red); border: .5px solid var(--red); border-radius: var(--r8); padding: 8px 14px; font-size: .82rem; cursor: pointer; font-family: inherit; }

/* ── 로그인 모달 ── */
.login-box {
  background: #fff; border-radius: var(--r16);
  padding: 2rem 1.75rem; width: 100%; max-width: 340px;
  box-shadow: 0 12px 40px rgba(0,0,0,.2);
  animation: popIn .17s ease; text-align: center;
}
.login-icon { font-size: 2rem; margin-bottom: .5rem; }
.login-box h2 { font-size: 1rem; font-weight: 700; margin-bottom: .3rem; }
.login-box p { font-size: .78rem; color: var(--gray-m); margin-bottom: 1.25rem; line-height: 1.5; }
.inp-wrap { position: relative; margin-bottom: .5rem; }
.inp-wrap input {
  width: 100%; padding: 10px 40px 10px 14px;
  font-size: .88rem; border: 1px solid var(--bd2); border-radius: var(--r8);
  background: var(--gray); color: var(--gray-d); font-family: inherit;
}
.inp-wrap input:focus { outline: 2px solid var(--green); background: #fff; }
.inp-wrap input.bad { border-color: var(--red); background: var(--red-l); }
.inp-wrap input.bad:focus { outline-color: var(--red); }
.eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: .85rem; color: var(--gray-m); }
.login-err { font-size: .75rem; color: var(--red); min-height: 1.1rem; margin-bottom: .6rem; }
.btn-login {
  width: 100%; background: var(--green); color: #fff; border: none;
  border-radius: var(--r8); padding: 10px; font-size: .9rem; font-weight: 700;
  cursor: pointer; font-family: inherit; margin-bottom: .5rem;
}
.btn-login:hover:not(:disabled) { background: var(--green-d); }
.btn-login:disabled { opacity: .4; cursor: not-allowed; }
.btn-cancel-sm { font-size: .78rem; color: var(--gray-m); background: none; border: none; cursor: pointer; font-family: inherit; }

/* ── 비밀번호 줄 ── */
.pw-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--gray); border-radius: var(--r8); margin-bottom: 6px; }
.pw-row span { flex: 1; font-size: .8rem; font-family: monospace; }
.pw-del { font-size: .72rem; color: var(--red); background: none; border: none; cursor: pointer; }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: #222; color: #fff; padding: 9px 20px; border-radius: 99px;
  font-size: .8rem; opacity: 0; pointer-events: none; white-space: nowrap;
  z-index: 999; transition: opacity .2s;
}
.toast.show { opacity: 1; }

/* ── 반응형 ── */
@media (max-width: 480px) {
  .site-header h1 { font-size: 1rem; }
  .time-col { width: 52px; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, push, update, remove }
                                                from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const cfg = {
  apiKey:            "AIzaSyAVSLJrQDD2fxlc2kkaVlGhVaxCpsltUz0",
  authDomain:        "semyung-spor.firebaseapp.com",
  databaseURL:       "https://semyung-spor-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "semyung-spor",
  storageBucket:     "semyung-spor.firebasestorage.app",
  messagingSenderId: "266780919685",
  appId:             "1:266780919685:web:f40b3e20b3a8ab30e726ec"
};

const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getDatabase(app);

/* 인증 상태 변화 감지 */
onAuthStateChanged(auth, user => {
  window._user = user;
  if (window.onAuthChange) window.onAuthChange(user);
});

/* 실시간 리스너 */
onValue(ref(db, "notices"), snap => {
  const list = [];
  snap.forEach(c => list.push({ id: c.key, ...c.val() }));
  list.sort((a, b) => b.time.localeCompare(a.time));
  window._notices = list;
  if (window.renderNotices) window.renderNotices();
});

onValue(ref(db, "events"), snap => {
  const list = [];
  snap.forEach(c => list.push({ id: c.key, ...c.val() }));
  list.sort((a, b) => a.time.localeCompare(b.time));
  window._events = list;
  if (window.renderSportFilter) window.renderSportFilter();
  if (window.renderTimeline)    window.renderTimeline();
});

/* Firebase 쓰기 함수들을 window에 노출 */
window._fb = {
  login:  (email, pw) => signInWithEmailAndPassword(auth, email, pw),
  logout: ()          => signOut(auth),
  push:   (path, d)   => push(ref(db, path), d),
  update: (path, d)   => update(ref(db, path), d),
  remove: (path)      => remove(ref(db, path)),
};

window._fbReady = true;
document.getElementById("liveLabel").textContent = "실시간 연결됨";
</script>

<div class="page">

  <!-- 헤더 -->
  <header class="site-header">
    <div>
      <h1>2025 체육대회 일정표</h1>
      <p class="sub">세명고등학교 · 운동장 및 체육관</p>
    </div>
    <div class="live-pill">
      <div class="live-dot"></div>
      <span id="liveLabel">연결 중...</span>
    </div>
  </header>

  <!-- 관리자 바 -->
  <div class="admin-bar" id="adminBar">
    <span class="clock" id="clock"></span>
    <button class="btn-admin" onclick="clickAdmin()">⚙ 관리자 모드</button>
  </div>

  <!-- 공지사항 -->
  <p class="sec-label">📢 공지사항</p>
  <div class="notice-list" id="noticeList">
    <p class="no-notice">불러오는 중...</p>
  </div>

  <!-- 필터 -->
  <div class="filter-box">
    <div class="fg">
      <label>학년</label>
      <select id="filterGrade" onchange="onGradeChange()">
        <option value="">전체</option>
        <option value="1">1학년</option>
        <option value="2">2학년</option>
        <option value="3">3학년</option>
      </select>
    </div>
    <div class="fg">
      <label>반</label>
      <select id="filterClass" onchange="renderTimeline()">
        <option value="">전체</option>
      </select>
    </div>
    <div class="fg">
      <label>종목</label>
      <select id="filterSport" onchange="renderTimeline()">
        <option value="">전체</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetFilters()">초기화</button>
  </div>

  <!-- 반 탭 -->
  <div class="class-tabs" id="classTabs" style="display:none"></div>

  <!-- 타임라인 -->
  <div class="timeline" id="timeline">
    <div class="tl-empty">일정을 불러오는 중...</div>
  </div>

</div><!-- /page -->

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<!-- 로그인 모달 -->
<div class="modal-wrap" id="loginModal">
  <div class="login-box">
    <div class="login-icon">🔐</div>
    <h2>관리자 로그인</h2>
    <p>Firebase에 등록된 관리자 계정으로 로그인하세요.</p>
    <div class="inp-wrap">
      <input type="email" id="loginEmail" placeholder="이메일"
        onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()"/>
    </div>
    <div class="inp-wrap">
      <input type="password" id="loginPw" placeholder="비밀번호"
        onkeydown="if(event.key==='Enter')doLogin()"
        oninput="clearLoginErr()"/>
      <button class="eye-btn" onclick="toggleEye()">👁</button>
    </div>
    <div class="login-err" id="loginErr"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">로그인</button>
    <br>
    <button class="btn-cancel-sm" onclick="closeLogin()">취소</button>
  </div>
</div>

<!-- 관리자 모달 -->
<div class="modal-wrap" id="adminModal" onclick="if(event.target===this)closeAdmin()">
  <div class="modal-box">
    <h2 id="modalTitle">관리자 메뉴</h2>

    <!-- 메인 메뉴 -->
    <div id="pMenu">
      <button class="m-btn m-green" onclick="showPage('pNotice')">📢 공지사항 추가</button>
      <button class="m-btn m-blue"  onclick="showPage('pEvent')">📅 경기 일정 추가</button>
      <button class="m-btn m-amber" onclick="showPage('pStatus')">🔄 경기 상태 변경</button>
      <button class="m-btn m-red"   onclick="showPage('pDelete')">🗑 경기 삭제</button>
      <div class="modal-footer">
        <button class="btn-d" onclick="doLogout()">로그아웃</button>
        <button class="btn-c" onclick="closeAdmin()">닫기</button>
      </div>
    </div>

    <!-- 공지 추가 -->
    <div id="pNotice" style="display:none">
      <div class="form-row">
        <label>중요도</label>
        <select id="nType">
          <option value="urgent">긴급 (빨간색)</option>
          <option value="info">일반 (파란색)</option>
        </select>
      </div>
      <div class="form-row">
        <label>공지 내용</label>
        <textarea id="nText" placeholder="공지 내용을 입력하세요..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-c" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-p" onclick="addNotice()">등록</button>
      </div>
    </div>

    <!-- 경기 추가 -->
    <div id="pEvent" style="display:none">
      <div class="form-grid">
        <div class="form-row"><label>시작 시간</label><input id="eTime" type="time" value="09:00"/></div>
        <div class="form-row"><label>소요 시간 (분)</label><input id="eDur" type="number" value="40" min="5" max="180"/></div>
        <div class="form-row"><label>종목</label><input id="eSport" placeholder="예: 축구"/></div>
        <div class="form-row"><label>장소</label><input id="ePlace" placeholder="예: 운동장 A"/></div>
      </div>
      <div class="form-row">
        <label>참가 반 (쉼표 구분, 예: 1-1, 2-3, 3-4)</label>
        <input id="eClasses" placeholder="1-1, 1-2, 2-3"/>
      </div>
      <div class="modal-footer">
        <button class="btn-c" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-p" onclick="addEvent()">추가</button>
      </div>
    </div>

    <!-- 상태 변경 -->
    <div id="pStatus" style="display:none">
      <div class="form-row"><label>경기 선택</label><select id="sEventId"></select></div>
      <div class="form-row">
        <label>변경할 상태</label>
        <select id="sStatus">
          <option value="upcoming">예정</option>
          <option value="current">진행중</option>
          <option value="done">완료</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-c" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-p" onclick="changeStatus()">변경</button>
      </div>
    </div>

    <!-- 경기 삭제 -->
    <div id="pDelete" style="display:none">
      <div class="form-row"><label>삭제할 경기</label><select id="dEventId"></select></div>
      <div class="modal-footer">
        <button class="btn-c" onclick="showPage('pMenu')">뒤로</button>
        <button class="btn-d" onclick="deleteEvent()">삭제</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════
   데모 데이터
═══════════════════════════════ */
const DEMO_NOTICES = [
  { id:"n1", type:"urgent", text:"13:00 이어달리기 출발 위치가 B트랙으로 변경되었습니다. 관련 반은 12:50까지 집합해 주세요.", time:"11:42" },
  { id:"n2", type:"info",   text:"점심시간은 12:00~13:00입니다. 학년별로 나누어 입장합니다.", time:"09:15" },
  { id:"n3", type:"info",   text:"날씨가 매우 덥습니다. 수분을 충분히 섭취하세요.", time:"08:50" },
];
const DEMO_EVENTS = [
  { id:"e1",  time:"09:00", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["1-1","1-2","1-3","1-4"], status:"done" },
  { id:"e2",  time:"09:00", sport:"축구",       place:"운동장 B",     dur:40, classes:["2-1","2-2"],             status:"done" },
  { id:"e3",  time:"09:40", sport:"배구",       place:"체육관 1코트", dur:40, classes:["3-1","3-2"],             status:"done" },
  { id:"e4",  time:"10:00", sport:"줄다리기",   place:"운동장 중앙",  dur:30, classes:["1-1","1-2","2-1","2-2"], status:"done" },
  { id:"e5",  time:"10:30", sport:"농구",       place:"체육관 2코트", dur:40, classes:["2-3","2-4"],             status:"current" },
  { id:"e6",  time:"10:30", sport:"피구",       place:"운동장 A구역", dur:40, classes:["1-3","1-4"],             status:"current" },
  { id:"e7",  time:"11:20", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["2-1","2-2","2-3","2-4"], status:"upcoming" },
  { id:"e8",  time:"11:20", sport:"축구",       place:"운동장 B",     dur:40, classes:["3-3","3-4"],             status:"upcoming" },
  { id:"e9",  time:"13:00", sport:"이어달리기", place:"운동장 B트랙", dur:30, classes:["3-1","3-2","3-3","3-4"], status:"upcoming" },
  { id:"e10", time:"13:00", sport:"줄다리기",   place:"운동장 중앙",  dur:30, classes:["3-1","3-2","1-3","1-4"], status:"upcoming" },
  { id:"e11", time:"14:00", sport:"배구",       place:"체육관 1코트", dur:40, classes:["1-1","1-2"],             status:"upcoming" },
  { id:"e12", time:"14:00", sport:"농구",       place:"체육관 2코트", dur:40, classes:["3-3","3-4"],             status:"upcoming" },
  { id:"e13", time:"15:00", sport:"피구",       place:"운동장 A구역", dur:40, classes:["2-3","2-4"],             status:"upcoming" },
  { id:"e14", time:"15:30", sport:"이어달리기", place:"운동장 A트랙", dur:30, classes:["1-1","1-2","1-3","1-4"], status:"upcoming" },
  { id:"e15", time:"16:00", sport:"축구",       place:"운동장 B",     dur:40, classes:["1-1","1-2","2-1","2-2"], status:"upcoming" },
];
const ALL_CLASSES = ["1-1","1-2","1-3","1-4","2-1","2-2","2-3","2-4","3-1","3-2","3-3","3-4"];

/* ═══════════════════════════════
   상태
═══════════════════════════════ */
let notices   = [];
let events    = [];
let activeTab = "";
window._user  = null;
window._notices = null;
window._events  = null;

/* ═══════════════════════════════
   Firebase 콜백 등록
═══════════════════════════════ */
window.renderNotices     = renderNotices;
window.renderSportFilter = renderSportFilter;
window.renderTimeline    = renderTimeline;

window.onAuthChange = function(user) {
  const bar = document.getElementById("adminBar");
  const btn = bar.querySelector(".btn-admin");
  if (user) {
    bar.classList.add("is-admin");
    btn.textContent = "⚙ 관리자 메뉴";
  } else {
    bar.classList.remove("is-admin");
    btn.textContent = "⚙ 관리자 모드";
  }
  renderNotices(); // 삭제 버튼 표시/숨김 갱신
};

/* Firebase 미연결 시 데모 모드 폴백 */
setTimeout(() => {
  if (!window._fbReady) {
    notices = [...DEMO_NOTICES];
    events  = [...DEMO_EVENTS];
    document.getElementById("liveLabel").textContent = "데모 모드";
    renderNotices(); renderSportFilter(); renderTimeline();
  }
}, 1500);

/* ═══════════════════════════════
   렌더: 공지사항
═══════════════════════════════ */
function renderNotices() {
  if (window._notices !== null) notices = window._notices;
  const el = document.getElementById("noticeList");
  if (!notices.length) { el.innerHTML = '<p class="no-notice">공지사항이 없습니다.</p>'; return; }
  const isAdmin = !!window._user;
  let h = "";
  for (const n of notices) {
    const lbl = n.type === "urgent" ? "긴급" : "공지";
    const bc  = n.type === "urgent" ? "nb-urgent" : "nb-info";
    const delBtn = isAdmin
      ? `<button class="n-del" onclick="deleteNotice('${n.id}')">✕</button>`
      : "";
    h += `<div class="n-item ${n.type}">` +
         `<span class="n-badge ${bc}">${lbl}</span>` +
         `<span class="n-text">${esc(n.text)}</span>` +
         `<span class="n-meta"><span class="n-time">${n.time}</span>${delBtn}</span>` +
         `</div>`;
  }
  el.innerHTML = h;
}

/* ═══════════════════════════════
   렌더: 종목 필터
═══════════════════════════════ */
function renderSportFilter() {
  if (window._events !== null) events = window._events;
  const sports = [...new Set(events.map(e => e.sport))].sort();
  const sel = document.getElementById("filterSport");
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체</option>' +
    sports.map(s => `<option value="${s}"${s === cur ? " selected" : ""}>${s}</option>`).join("");
}

/* ═══════════════════════════════
   렌더: 타임라인
═══════════════════════════════ */
function getFiltered() {
  if (window._events !== null) events = window._events;
  const grade = document.getElementById("filterGrade").value;
  const cls   = activeTab || document.getElementById("filterClass").value;
  const sport = document.getElementById("filterSport").value;
  return events.filter(e => {
    if (sport && e.sport !== sport) return false;
    if (cls)   return e.classes.includes(cls);
    if (grade) return e.classes.some(c => c.startsWith(grade + "-"));
    return true;
  });
}

function renderTimeline() {
  const myClass  = activeTab || document.getElementById("filterClass").value;
  const filtered = getFiltered();
  const tl = document.getElementById("timeline");

  if (!filtered.length) {
    tl.innerHTML = '<div class="tl-empty">해당하는 경기 일정이 없습니다.</div>';
    return;
  }

  // 시간대별 그룹
  const grouped = {};
  for (const e of filtered) {
    if (!grouped[e.time]) grouped[e.time] = [];
    grouped[e.time].push(e);
  }
  const times = Object.keys(grouped).sort();

  let html = "";
  for (const t of times) {
    // 카드들
    let cards = "";
    for (const e of grouped[t]) {
      const statusLabel = { current: "진행중", upcoming: "예정", done: "완료" }[e.status] ?? "예정";
      const badgeCls    = { current: "eb-cur",  upcoming: "eb-up",  done: "eb-don" }[e.status] ?? "eb-up";
      const cardCls     = { current: "e-cur",   done: "e-don" }[e.status] ?? "";

      let tags = "";
      for (const c of e.classes) {
        const hl = myClass && c === myClass ? " hl" : "";
        tags += `<span class="e-tag${hl}">${esc(c)}</span>`;
      }

      cards +=
        `<div class="e-card ${cardCls}">` +
          `<div class="e-top">` +
            `<span class="e-name">${esc(e.sport)}</span>` +
            `<span class="e-badge ${badgeCls}">${statusLabel}</span>` +
          `</div>` +
          `<div class="e-meta">` +
            `<span class="e-mi">📍 ${esc(e.place)}</span>` +
            `<span class="e-mi">⏱ ${e.dur}분</span>` +
          `</div>` +
          `<div class="e-tags">${tags}</div>` +
        `</div>`;
    }

    html +=
      `<div class="time-row">` +
        `<div class="time-col">` +
          `<span class="time-txt">${t}</span>` +
          `<div class="time-line"></div>` +
        `</div>` +
        `<div class="event-col">${cards}</div>` +
      `</div>`;
  }

  tl.innerHTML = html;
}

/* ═══════════════════════════════
   필터 컨트롤
═══════════════════════════════ */
function onGradeChange() {
  const grade = document.getElementById("filterGrade").value;
  activeTab = "";
  const fc = grade ? ALL_CLASSES.filter(c => c.startsWith(grade + "-")) : ALL_CLASSES;
  document.getElementById("filterClass").innerHTML =
    '<option value="">전체</option>' + fc.map(c => `<option value="${c}">${c}반</option>`).join("");

  const tabs = document.getElementById("classTabs");
  if (grade) {
    tabs.style.display = "flex";
    tabs.innerHTML = `<button class="c-tab on" onclick="setTab('')">전체</button>` +
      fc.map(c => `<button class="c-tab" id="ctab-${c}" onclick="setTab('${c}')">${c}반</button>`).join("");
  } else {
    tabs.style.display = "none";
    tabs.innerHTML = "";
  }
  renderTimeline();
}

function setTab(cls) {
  activeTab = cls;
  document.querySelectorAll(".c-tab").forEach(el => el.classList.remove("on"));
  const t = cls ? document.getElementById("ctab-" + cls) : document.querySelector(".c-tab");
  if (t) t.classList.add("on");
  document.getElementById("filterClass").value = cls;
  renderTimeline();
}

function resetFilters() {
  ["filterGrade", "filterClass", "filterSport"].forEach(id => document.getElementById(id).value = "");
  activeTab = "";
  document.getElementById("classTabs").style.display = "none";
  document.getElementById("classTabs").innerHTML = "";
  renderTimeline();
}

/* ═══════════════════════════════
   로그인 / 로그아웃
═══════════════════════════════ */
function clickAdmin() {
  if (window._user) openAdmin();
  else openLogin();
}

function openLogin() {
  document.getElementById("loginEmail").value = "";
  document.getElementById("loginPw").value = "";
  document.getElementById("loginErr").textContent = "";
  document.getElementById("loginBtn").disabled = false;
  document.getElementById("loginModal").classList.add("open");
  setTimeout(() => document.getElementById("loginEmail").focus(), 80);
}
function closeLogin() { document.getElementById("loginModal").classList.remove("open"); }

function clearLoginErr() {
  document.getElementById("loginErr").textContent = "";
  document.getElementById("loginPw").classList.remove("bad");
}

function toggleEye() {
  const i = document.getElementById("loginPw");
  i.type = i.type === "password" ? "text" : "password";
}

async function doLogin() {
  const email = document.getElementById("loginEmail").value.trim();
  const pw    = document.getElementById("loginPw").value;
  if (!email || !pw) { document.getElementById("loginErr").textContent = "이메일과 비밀번호를 입력해 주세요."; return; }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "로그인 중...";

  if (!window._fb) {
    document.getElementById("loginErr").textContent = "Firebase가 연결되지 않았습니다.";
    btn.disabled = false; btn.textContent = "로그인";
    return;
  }

  try {
    await window._fb.login(email, pw);
    closeLogin();
    openAdmin();
    showToast("관리자로 로그인되었습니다.");
  } catch(e) {
    document.getElementById("loginPw").classList.add("bad");
    const msg = e.code === "auth/invalid-credential" || e.code === "auth/wrong-password"
      ? "이메일 또는 비밀번호가 올바르지 않습니다."
      : e.code === "auth/too-many-requests"
      ? "시도 횟수 초과 — 잠시 후 다시 시도하세요."
      : "로그인 실패: " + e.message;
    document.getElementById("loginErr").textContent = msg;
  } finally {
    btn.disabled = false;
    btn.textContent = "로그인";
  }
}

async function doLogout() {
  await window._fb?.logout();
  closeAdmin();
  showToast("로그아웃 되었습니다.");
}

/* ═══════════════════════════════
   관리자 모달
═══════════════════════════════ */
function openAdmin() {
  showPage("pMenu");
  fillEventSelects();
  document.getElementById("adminModal").classList.add("open");
}
function closeAdmin() { document.getElementById("adminModal").classList.remove("open"); }

function showPage(id) {
  ["pMenu","pNotice","pEvent","pStatus","pDelete"].forEach(p => {
    document.getElementById(p).style.display = p === id ? "" : "none";
  });
  const titles = {
    pMenu:"관리자 메뉴", pNotice:"공지사항 추가",
    pEvent:"경기 일정 추가", pStatus:"경기 상태 변경", pDelete:"경기 삭제"
  };
  document.getElementById("modalTitle").textContent = titles[id] ?? "";
}

function fillEventSelects() {
  const opts = events.map(e =>
    `<option value="${e.id}">${e.time} ${esc(e.sport)} (${e.classes.join(", ")})</option>`
  ).join("");
  document.getElementById("sEventId").innerHTML = opts || '<option value="">경기 없음</option>';
  document.getElementById("dEventId").innerHTML = opts || '<option value="">경기 없음</option>';
}

/* ── 공지 추가 ── */
function addNotice() {
  const type = document.getElementById("nType").value;
  const text = document.getElementById("nText").value.trim();
  if (!text) { showToast("내용을 입력해 주세요."); return; }
  const now = new Date();
  const time = pad(now.getHours()) + ":" + pad(now.getMinutes());
  window._fb.push("notices", { type, text, time })
    .then(() => showToast("공지사항이 등록되었습니다."))
    .catch(e => showToast("❌ 오류: " + e.message));
  document.getElementById("nText").value = "";
  closeAdmin();
}

/* ── 공지 삭제 ── */
function deleteNotice(id) {
  if (!window._user || !confirm("이 공지사항을 삭제하시겠습니까?")) return;
  window._fb.remove("notices/" + id)
    .then(() => showToast("공지사항이 삭제되었습니다."))
    .catch(e => showToast("❌ 오류: " + e.message));
}

/* ── 경기 추가 ── */
function addEvent() {
  const time    = document.getElementById("eTime").value;
  const sport   = document.getElementById("eSport").value.trim();
  const place   = document.getElementById("ePlace").value.trim();
  const dur     = parseInt(document.getElementById("eDur").value) || 40;
  const classes = document.getElementById("eClasses").value
    .split(",").map(c => c.trim()).filter(Boolean);
  if (!time || !sport || !classes.length) {
    showToast("시간, 종목, 참가 반을 모두 입력해 주세요."); return;
  }
  window._fb.push("events", { time, sport, place, dur, classes, status: "upcoming" })
    .then(() => showToast("경기 일정이 추가되었습니다."))
    .catch(e => showToast("❌ 오류: " + e.message));
  ["eSport","ePlace","eClasses"].forEach(id => document.getElementById(id).value = "");
  closeAdmin();
}

/* ── 상태 변경 ── */
function changeStatus() {
  const id     = document.getElementById("sEventId").value;
  const status = document.getElementById("sStatus").value;
  if (!id) { showToast("경기를 선택해 주세요."); return; }
  window._fb.update("events/" + id, { status })
    .then(() => showToast("경기 상태가 변경되었습니다."))
    .catch(e => showToast("❌ 오류: " + e.message));
  closeAdmin();
}

/* ── 경기 삭제 ── */
function deleteEvent() {
  const id = document.getElementById("dEventId").value;
  if (!id || !confirm("이 경기를 삭제하시겠습니까?")) return;
  window._fb.remove("events/" + id)
    .then(() => showToast("경기가 삭제되었습니다."))
    .catch(e => showToast("❌ 오류: " + e.message));
  closeAdmin();
}

/* ═══════════════════════════════
   유틸
═══════════════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function pad(n) { return String(n).padStart(2, "0"); }

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

function updateClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    `현재 시각: ${pad(n.getHours())}:${pad(n.getMinutes())}`;
}
updateClock();
setInterval(updateClock, 30000);
</script>
</body>
</html>
